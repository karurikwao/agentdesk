name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Use pinned npm
        run: npm install -g npm@11.13.0

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Pack dry run
        run: npm pack --dry-run --ignore-scripts

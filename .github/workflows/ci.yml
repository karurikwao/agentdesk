name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Use pinned npm
        run: npm install -g npm@11.13.0

      - name: Install
        run: npm ci

      - name: Verify core
        run: npm run verify:core

      - name: Check launch page references
        run: npm run check:launch-page

      - name: Package smoke
        run: npm run smoke:package

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser regression
        run: npm run test:e2e

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Pack dry run
        run: npm pack --dry-run --ignore-scripts

  pages-artifact:
    name: Build GitHub Pages Artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Check Pages entry
        run: test -f docs/index.html

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
